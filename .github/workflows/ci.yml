name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project (with dev deps)
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q
